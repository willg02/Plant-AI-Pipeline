<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Plant AI Advisor</title>
    <style>
        :root {
            --bg:        #f5f7f0;
            --surface:   #ffffff;
            --primary:   #2d6a4f;
            --primary-l: #40916c;
            --accent:    #95d5b2;
            --text:      #1b4332;
            --text-muted: #6c757d;
            --user-bg:   #d8f3dc;
            --ai-bg:     #ffffff;
            --border:    #dee2e6;
            --shadow:    0 2px 8px rgba(0,0,0,0.08);
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: var(--bg);
            color: var(--text);
            height: 100vh;
            display: flex;
            flex-direction: column;
        }

        /* ── Header ─────────────────────────── */
        header {
            background: var(--primary);
            color: white;
            padding: 16px 24px;
            display: flex;
            align-items: center;
            gap: 12px;
            box-shadow: var(--shadow);
            z-index: 10;
        }
        header .logo { font-size: 28px; }
        header h1 { font-size: 20px; font-weight: 600; }
        header .subtitle { font-size: 13px; opacity: 0.85; }
        #plant-count {
            margin-left: auto;
            background: rgba(255,255,255,0.15);
            padding: 4px 12px;
            border-radius: 12px;
            font-size: 13px;
        }

        /* ── Chat Area ──────────────────────── */
        #chat-area {
            flex: 1;
            overflow-y: auto;
            padding: 24px;
            display: flex;
            flex-direction: column;
            gap: 16px;
        }

        .message {
            max-width: 75%;
            padding: 14px 18px;
            border-radius: 16px;
            line-height: 1.55;
            font-size: 15px;
            box-shadow: var(--shadow);
            animation: fadeIn 0.25s ease;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(8px); }
            to   { opacity: 1; transform: translateY(0); }
        }

        .message.user {
            background: var(--user-bg);
            align-self: flex-end;
            border-bottom-right-radius: 4px;
        }
        .message.ai {
            background: var(--ai-bg);
            align-self: flex-start;
            border-bottom-left-radius: 4px;
            border: 1px solid var(--border);
        }
        .message.ai strong { color: var(--primary); }
        .message .meta {
            font-size: 11px;
            color: var(--text-muted);
            margin-top: 8px;
        }

        .message.system {
            align-self: center;
            background: transparent;
            box-shadow: none;
            color: var(--text-muted);
            font-size: 14px;
            text-align: center;
            padding: 8px;
        }

        /* ── Typing indicator ───────────────── */
        .typing { display: flex; gap: 4px; padding: 14px 18px; align-self: flex-start; }
        .typing span {
            width: 8px; height: 8px; border-radius: 50%;
            background: var(--accent);
            animation: bounce 1.2s infinite ease-in-out;
        }
        .typing span:nth-child(2) { animation-delay: 0.2s; }
        .typing span:nth-child(3) { animation-delay: 0.4s; }
        @keyframes bounce {
            0%, 80%, 100% { transform: scale(0.6); opacity: 0.4; }
            40% { transform: scale(1); opacity: 1; }
        }

        /* ── Input Bar ──────────────────────── */
        #input-bar {
            display: flex;
            gap: 10px;
            padding: 16px 24px;
            background: var(--surface);
            border-top: 1px solid var(--border);
        }
        #input-bar input {
            flex: 1;
            padding: 12px 16px;
            border: 2px solid var(--border);
            border-radius: 24px;
            font-size: 15px;
            outline: none;
            transition: border-color 0.2s;
        }
        #input-bar input:focus { border-color: var(--primary-l); }
        #input-bar button {
            padding: 12px 24px;
            background: var(--primary);
            color: white;
            border: none;
            border-radius: 24px;
            font-size: 15px;
            font-weight: 600;
            cursor: pointer;
            transition: background 0.2s;
        }
        #input-bar button:hover { background: var(--primary-l); }
        #input-bar button:disabled { opacity: 0.5; cursor: not-allowed; }

        /* ── Suggested Prompts ──────────────── */
        #suggestions {
            display: flex;
            gap: 8px;
            flex-wrap: wrap;
            justify-content: center;
            padding: 0 24px 8px;
        }
        .suggestion {
            padding: 8px 14px;
            background: var(--surface);
            border: 1px solid var(--accent);
            border-radius: 16px;
            font-size: 13px;
            color: var(--primary);
            cursor: pointer;
            transition: all 0.2s;
        }
        .suggestion:hover {
            background: var(--accent);
            color: white;
        }
    </style>
</head>
<body>
    <header>
        <div class="logo">🌿</div>
        <div>
            <h1>Plant AI Advisor</h1>
            <div class="subtitle">Ask me anything about our plant selection</div>
        </div>
        <div id="plant-count">Loading...</div>
    </header>

    <div id="chat-area">
        <div class="message system">
            Welcome! Ask me about our plants — sun needs, size, color, anything you like.
        </div>
    </div>

    <div id="suggestions">
        <div class="suggestion" onclick="useSuggestion(this)">What blooms in spring?</div>
        <div class="suggestion" onclick="useSuggestion(this)">Show me drought-tolerant plants</div>
        <div class="suggestion" onclick="useSuggestion(this)">Full sun shrubs under 4 feet?</div>
        <div class="suggestion" onclick="useSuggestion(this)">What evergreen options do you have?</div>
        <div class="suggestion" onclick="useSuggestion(this)">Deer-resistant plants?</div>
    </div>

    <div id="input-bar">
        <input type="text" id="question" placeholder="Ask about our plants..." 
               onkeydown="if(event.key==='Enter')sendQuestion()">
        <button id="send-btn" onclick="sendQuestion()">Ask</button>
    </div>

    <script>
        const chatArea   = document.getElementById('chat-area');
        const questionEl = document.getElementById('question');
        const sendBtn    = document.getElementById('send-btn');
        const suggestions = document.getElementById('suggestions');

        // Load plant count on startup
        fetch('/api/status')
            .then(r => r.json())
            .then(d => {
                document.getElementById('plant-count').textContent = 
                    `${d.plant_count} plant${d.plant_count !== 1 ? 's' : ''} in database`;
            })
            .catch(() => {
                document.getElementById('plant-count').textContent = 'DB unavailable';
            });

        function useSuggestion(el) {
            questionEl.value = el.textContent;
            sendQuestion();
        }

        function addMessage(text, role) {
            const div = document.createElement('div');
            div.className = `message ${role}`;
            // Support bold (**text**) in AI responses
            if (role === 'ai') {
                text = text.replace(/\*\*(.*?)\*\*/g, '<strong>$1</strong>');
                text = text.replace(/\n/g, '<br>');
            }
            div.innerHTML = text;
            chatArea.appendChild(div);
            chatArea.scrollTop = chatArea.scrollHeight;
            return div;
        }

        function showTyping() {
            const div = document.createElement('div');
            div.className = 'typing';
            div.id = 'typing-indicator';
            div.innerHTML = '<span></span><span></span><span></span>';
            chatArea.appendChild(div);
            chatArea.scrollTop = chatArea.scrollHeight;
        }

        function hideTyping() {
            const el = document.getElementById('typing-indicator');
            if (el) el.remove();
        }

        async function sendQuestion() {
            const question = questionEl.value.trim();
            if (!question) return;

            // Hide suggestions after first use
            suggestions.style.display = 'none';

            addMessage(question, 'user');
            questionEl.value = '';
            sendBtn.disabled = true;
            showTyping();

            try {
                const res = await fetch('/api/ask', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ question }),
                });

                hideTyping();

                if (!res.ok) throw new Error(`Server error: ${res.status}`);

                const data = await res.json();
                const msg = addMessage(data.answer, 'ai');

                // Add metadata line
                const meta = document.createElement('div');
                meta.className = 'meta';
                meta.textContent = `${data.result_count} plant${data.result_count !== 1 ? 's' : ''} matched`;
                msg.appendChild(meta);

            } catch (err) {
                hideTyping();
                addMessage(`Sorry, something went wrong: ${err.message}`, 'ai');
            }

            sendBtn.disabled = false;
            questionEl.focus();
        }
    </script>
</body>
</html>
